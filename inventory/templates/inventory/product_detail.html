<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto</title>
</head>
<body>
    <h1>{{ producto.nombre }}</h1>
    <p>Categoría: {{ producto.categoria }}</p>
    <p>Precio: {{ producto.precio }}</p>
    <p>Stock: {{ producto.stock }}</p>

    <a href="{% url 'producto-editar' producto.id %}">Editar</a> |
    <a href="{% url 'producto-eliminar' producto.id %}" onclick="return confirm('¿Estás seguro de que deseas eliminar este producto?');">Eliminar</a>
    <br>
    <a href="{% url 'producto-list' %}">Volver a la lista</a>
</body>
</html>
